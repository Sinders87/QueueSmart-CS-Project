<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <div class="login-box" style="width: 800px; margin: 50px; padding: 30px;">  
        <h2>Academic Advising</h2>

        <hr>

        <h3 align="center">Queue Status</h3>

        <table bgcolor="black" align="center">
            <tr bgcolor="grey">
                <th width="100" style="color: black;">Advising</th>
                <th width="100" style="color: black;">Estimated Wait Time</th>
            </tr>
            <tr bgcolor="lightgrey" align="center">
                <td id="queueLength" width="100" style="color: black;">0</td>
                <td id="totalWait" width="100" style="color: black;">0 Minutes</td>
            </tr>
        </table>

        <br>

        <table bgcolor="black" align="center">
            <tr bgcolor="grey">
                <th width="100" style="color: black;">ID</th>
                <th width="100" style="color: black;">Name</th>
                <th width="100" style="color: black;">Position</th>
                <th width="100" style="color: black;">Estimated Wait</th>
                <th width="100" style="color: black;">Move</th>
                <th width="100" style="color: black;">Action</th>
            </tr>

            <tbody id="queueBody"></tbody>
        </table>

        <p class="link">
            Click below to return to dashboard.
            <br>
            <br>
            <a href="admin-dashboard.html">Admin Dashboard</a>
            <br>
            <br>
            <a href="#" onclick="logout()">Logout</a>
        </p>
    </div>

    <script src="../js/data.js"></script>
    <script src="../js/estWaitTime.js"></script>

    <script>
        async function load() {
            const services = await loadServices();
            const queue = await loadQueue();

            const tableBody = document.getElementById("queueBody");
            tableBody.innerHTML = "";

            let count = 0;
            let duration = 0;

            for (let i = 0; i < queue.length; i++) {
                const person = queue[i];

                if (person.serviceId !== 1) continue;

                count++;
        
                for (let j = 0; j < services.length; j++) {
                    if (services[j].id == person.serviceId) {
                        duration = services[j].expectedDuration;
                    }
                }

                person.estimatedWait = estWaitTime(person.position, duration);
            
                const row = document.createElement("tr");
                row.setAttribute("bgcolor", "lightgrey");
                row.setAttribute("align", "center");

                row.innerHTML = 
                    "<td>" + person.id + "</td>" +
                    "<td>" + person.userName + "</td>" +
                    "<td>" + person.position + "</td>" +
                    "<td>" + person.estimatedWait + " Minutes</td>" +
                    "<td>" +
                        "<button onclick='moveUp(this)'>Move Up</button>" +
                        "<button onclick='moveDown(this)'>Move Down</button>" +
                    "</td>" +
                    "<td>" +
                        "<button>Serve</button>" +
                        "<button onclick='removeUser(this)'>Remove</button>" +
                    "</td>";

                tableBody.appendChild(row);
            }

            let totalWaitTime = 0;
            if (count > 0) {
                totalWaitTime = (count - 1) * duration;
            }

            document.getElementById("queueLength").textContent = count;
            document.getElementById("totalWait").textContent = totalWaitTime + " Minutes";
        }

        load();
    </script>

    <script>
    function logout() {
        localStorage.removeItem("qs_email");
        localStorage.removeItem("qs_role");
        localStorage.removeItem("qs_user");
        window.location.href = "admin-login.html";
    }

    const user = JSON.parse(localStorage.getItem("qs_user"));
    if (!user || user.role !== "admin") {
        window.location.href = "admin-login.html";
    }

    function removeUser(button) {
        const row = button.closest("tr");
        if (row) row.remove();
    }

    function moveUp(button) {
        const row = button.closest("tr");
        const prev = row.previousElementSibling;
        if (row && prev && prev.rowIndex > 0) {
            row.parentNode.insertBefore(row, prev);
        }
    }

    function moveDown(button) {
        const row = button.closest("tr");
        const next = row.nextElementSibling;
        if (row && next) {
            row.parentNode.insertBefore(next, row);
        }
    }
    </script>

</body>
</html>
