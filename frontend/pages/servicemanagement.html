<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Service Management</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <div style="text-align:right; margin:20px;">
        <a href="#" onclick="logout()">Logout</a>
    </div>

    <div class="login-box" style="width: 800px; margin: 50px; padding: 30px;">
        <h2>Service Management</h2>

        <hr>

        <h3 align="center">Select Service to Modify</h3>

        <div class="role-box">
            <label for="services">Choose a Service:</label>

            <select name="services" id="services">
                <option value="academic-advising">Academic Advising</option>
                <option value="financial-aid">Financial Aid</option>
                <option value="IT-helpdesk">IT Help Desk</option>
                <option value="registration-support">Registration Support</option>
                <option value="new-service">Add New Service</option>
            </select>

            <br>
            <br>

            <form id="newService" novalidate>

                <input id="service-name" name="service-name" type="text" placeholder="Service Name (Required, Max 100 Characters)" required>
                <div id="service-nameError" class="field-error"></div>

                <input id="description" name="description" type="text" placeholder="Description (Required)" required>
                <div id="descriptionError" class="field-error"></div>

                <label for="priority">Priority Level:</label>
                <select name="priority" id="priority">
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                </select>

                <br>
                <br>

                <label for="minutes">Expected Duration (In Minutes):</label>
                <input id="minutes" name="minutes-name" type="number" placeholder="Minutes (Required)" required>
                <div id="minutes-nameError" class="field-error"></div>

                <br>

                <button type="submit">Submit Changes</button>

                <div id="changeSuccess" class="success-box" style="display:none;"></div>

                <p class="link">
                    Click below to return to admin dashboard.
                    <br>
                    <br>
                    <a href="admin-dashboard.html">Admin Dashboard</a>
                    <br>
                    <br>
                    <a href="#" onclick="logout()">Logout</a>
                </p>

            </form>
        </div>
    </div>

    <script>
    function logout() {
      localStorage.removeItem("qs_email");
      localStorage.removeItem("qs_role");
      localStorage.removeItem("qs_user");
      window.location.href = "admin-login.html";
    }

    const user = JSON.parse(localStorage.getItem("qs_user"));
    if (!user || user.role !== "admin") {
      window.location.href = "admin-login.html";
    }

    document.getElementById("newService").addEventListener("submit", async function(e) {
      e.preventDefault();

      const name = document.getElementById("service-name").value.trim();
      const description = document.getElementById("description").value.trim();
      const priority = document.getElementById("priority").value;
      const expectedDuration = Number(document.getElementById("minutes").value);
      const successBox = document.getElementById("changeSuccess");

      if (!name || !description || !expectedDuration) {
        alert("Please fill out all required fields.");
        return;
      }

      try {
        const res = await fetch("http://localhost:3000/api/services", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            name,
            description,
            expectedDuration,
            priority,
            isActive: true
          })
        });

        const data = await res.json();

        if (!res.ok) {
          alert(data.error || "Could not save service.");
          return;
        }

        successBox.textContent = "Service saved successfully.";
        successBox.style.display = "block";

        this.reset();
      } catch (err) {
        alert("Could not connect to backend.");
        console.error(err);
      }
    });
    </script>

</body>
</html>
